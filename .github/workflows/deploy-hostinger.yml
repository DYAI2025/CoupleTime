name: Build & Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Deploy via rsync to VPS
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.DS_Store'
          path: app/dist/
          remote_path: /var/www/coupletimer.site/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: 22
          remote_user: root
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Verify
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://coupletimer.site/)
          echo "coupletimer.site → HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Live" || echo "⚠️ Check site"
