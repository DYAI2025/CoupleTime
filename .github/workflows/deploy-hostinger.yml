name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: # Manuell auslösbar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Deploy via rsync (SSH)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.DS_Store'
          path: app/dist/
          remote_path: /home/${{ secrets.HOSTINGER_SSH_USER }}/public_html/
          remote_host: ${{ secrets.HOSTINGER_SSH_HOST }}
          remote_port: 65002
          remote_user: ${{ secrets.HOSTINGER_SSH_USER }}
          remote_key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Verify deployment
        run: |
          echo "✅ Deployed to https://coupletimer.site"
          echo "📢 ads.txt: https://coupletimer.site/ads.txt"
